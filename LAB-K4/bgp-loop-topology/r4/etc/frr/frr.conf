!
! FRRouting configuration file
!
password zebra
enable password zebra
!
log file /var/log/frr/frr.log
!
!  BGP CONFIGURATION
!
debug bgp keepalives
debug bgp updates in
debug bgp updates out
! 
! YOUR OWN CONFIGURATION: MODIFY BELOW 
!
router bgp 400
no bgp network import-check
neighbor 6.6.6.30 remote-as 300
neighbor 6.6.6.30 description Router 3 of AS300

neighbor 8.8.8.10 remote-as 100
neighbor 8.8.8.10 description Router 1 of AS100
network 6.6.6.0/24
network 7.7.7.0/24
network 8.8.8.0/24

neighbor 8.8.8.10 prefix-list routerInr1 in
neighbor 8.8.8.10 prefix-list routerOutr1 out

neighbor 6.6.6.30 prefix-list routerInr3 in
neighbor 6.6.6.30 prefix-list routerOutr3 out

ip prefix-list routerInr1 permit 1.1.1.0/24
ip prefix-list routerInr1 permit 2.2.2.0/24
ip prefix-list routerInr1 permit 3.3.3.0/24
ip prefix-list routerInr1 permit 4.4.4.0/24
ip prefix-list routerInr1 permit 5.5.5.0/24

ip prefix-list routerOutr1 permit 1.1.1.0/24
ip prefix-list routerOutr1 permit 2.2.2.0/24
ip prefix-list routerOutr1 permit 3.3.3.0/24
ip prefix-list routerOutr1 permit 4.4.4.0/24
ip prefix-list routerOutr1 permit 5.5.5.0/24
ip prefix-list routerOutr1 permit 6.6.6.0/24
ip prefix-list routerOutr1 permit 7.7.7.0/24

ip prefix-list routerInr3 permit 1.1.1.0/24
ip prefix-list routerInr3 permit 2.2.2.0/24
ip prefix-list routerInr3 permit 3.3.3.0/24
ip prefix-list routerInr3 permit 4.4.4.0/24
ip prefix-list routerInr3 permit 5.5.5.0/24


ip prefix-list routerOutr3 permit 1.1.1.0/24
ip prefix-list routerOutr3 permit 2.2.2.0/24
ip prefix-list routerOutr3 permit 3.3.3.0/24
ip prefix-list routerOutr3 permit 4.4.4.0/24
ip prefix-list routerOutr3 permit 5.5.5.0/24
ip prefix-list routerOutr3 permit 7.7.7.0/24
ip prefix-list routerOutr3 permit 8.8.8.0/24
